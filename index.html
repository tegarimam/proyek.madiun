<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Madiun</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1a73e8; text-align: center; margin-top: 0; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 14px; color: #333; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        input:focus, textarea:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 5px rgba(26,115,232,0.2); }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #notif { margin-top: 20px; padding: 12px; border-radius: 8px; text-align: center; display: none; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h2>Monitoring Madiun</h2>
    <form id="formLaporan">
        <label>Nama Pekerjaan</label>
        <input type="text" name="namaPekerjaan" placeholder="Misal: Pemasangan Ramie Fiber" required>
        
        <label>Detail Pekerjaan</label>
        <textarea name="detailPekerjaan" rows="3" placeholder="Jelaskan progres hari ini..." required></textarea>
        
        <label>Persentase Proyek (%)</label>
        <input type="number" name="persentase" min="0" max="100" placeholder="0 - 100" required>
        
        <button type="submit" id="btnKirim">Kirim Laporan</button>
    </form>
    <div id="notif"></div>
</div>

<script>
    // MASUKKAN URL DARI GOOGLE APPS SCRIPT DI BAWAH INI
    const scriptURL = 'LINK_WEB_APP_DARI_LANGKAH_1_DISINI';
    
    const form = document.getElementById('formLaporan');
    const btn = document.getElementById('btnKirim');
    const notif = document.getElementById('notif');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Sedang Mengirim...';
        notif.style.display = 'none';
        
        // Mode no-cors digunakan untuk menghindari masalah keamanan browser saat kirim ke Google
        fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors'})
        .then(() => {
            notif.style.display = 'block';
            notif.style.background = '#d4edda';
            notif.style.color = '#155724';
            notif.innerText = '✅ Laporan Berhasil Masuk ke Spreadsheet!';
            btn.disabled = false;
            btn.innerText = 'Kirim Laporan';
            form.reset();
        })
        .catch(error => {
            notif.style.display = 'block';
            notif.style.background = '#f8d7da';
            notif.style.color = '#721c24';
            notif.innerText = '❌ Gagal mengirim. Cek URL atau koneksi.';
            btn.disabled = false;
            btn.innerText = 'Kirim Laporan';
        });
    });
</script>

</body>
</html>
