<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Madiun</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #5f6368; font-size: 0.9rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; color: #3c4043; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: #1a73e8; ring: 2px rgba(26,115,232,0.2); }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1765cc; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #msg { margin-top: 15px; padding: 10px; border-radius: 5px; text-align: center; font-size: 0.85rem; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Monitoring Madiun</h2>
    <p class="subtitle">Laporan Proyek Harian</p>
    
    <form id="proyekForm">
        <div class="form-group">
            <label>Nama Pekerjaan</label>
            <input type="text" name="namaPekerjaan" placeholder="Contoh: Pemasangan Kolom" required>
        </div>
        <div class="form-group">
            <label>Detail Pekerjaan</label>
            <textarea name="detailPekerjaan" rows="3" placeholder="Jelaskan progres..." required></textarea>
        </div>
        <div class="form-group">
            <label>Persentase Proyek (%)</label>
            <input type="number" name="persentase" min="0" max="100" placeholder="0-100" required>
        </div>
        <button type="submit" id="btnKirim">Kirim ke Spreadsheet</button>
    </form>
    
    <div id="msg"></div>
</div>

<script>
    // GANTI LINK DI BAWAH INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT
    const scriptURL = 'URL_WEB_APP_BARU_ANDA';
    const form = document.getElementById('proyekForm');
    const btn = document.getElementById('btnKirim');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = 'Mengirim...';
        msg.style.display = 'none';

        // Mengirim data menggunakan fetch
        fetch(scriptURL, { 
            method: 'POST', 
            body: new FormData(form),
            mode: 'no-cors' // Solusi utama untuk menghindari Error CORS di GitHub Pages
        })
        .then(() => {
            msg.style.display = 'block';
            msg.style.background = '#e6f4ea';
            msg.style.color = '#1e7e34';
            msg.innerHTML = '✅ Laporan terkirim! Cek Spreadsheet Anda.';
            btn.disabled = false;
            btn.innerHTML = 'Kirim ke Spreadsheet';
            form.reset();
        })
        .catch(error => {
            msg.style.display = 'block';
            msg.style.background = '#fce8e6';
            msg.style.color = '#d93025';
            msg.innerHTML = '❌ Gagal mengirim. Cek koneksi/script.';
            btn.disabled = false;
            btn.innerHTML = 'Kirim ke Spreadsheet';
            console.error('Error!', error.message);
        });
    });
</script>

</body>
</html>
