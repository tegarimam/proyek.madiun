<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Madiun</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #eee; }
        .box { background: white; padding: 20px; border-radius: 10px; width: 100%; max-width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h3 style="text-align:center">Monitoring Madiun</h3>
    <form id="formMadiun">
        <input type="text" name="namaPekerjaan" placeholder="Nama Pekerjaan" required>
        <textarea name="detailPekerjaan" placeholder="Detail Progres" required></textarea>
        <input type="number" name="persentase" placeholder="Persentase (%)" required>
        <button type="submit" id="btnKirim">Kirim Data</button>
    </form>
    <div id="status"></div>
</div>

<script>
    // GANTI DENGAN URL BARU DARI LANGKAH 1
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyU1rpo5jQlHx0TglTNhTYb9TpYgm3rc898Bec4A34UVo4o-aoKMG2m4hAZCFaF8Jw_JQ/exec';
    const form = document.getElementById('formMadiun');
    const status = document.getElementById('status');

    form.addEventListener('submit', e => {
        e.preventDefault();
        status.innerText = "Sedang mengirim...";
        status.style.color = "black";
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
        .then(() => {
            status.innerText = "✅ BERHASIL! Cek Spreadsheet.";
            status.style.color = "green";
            form.reset();
        })
        .catch(() => {
            status.innerText = "❌ GAGAL! Cek URL.";
            status.style.color = "red";
        });
    });
</script>

</body>
</html>
