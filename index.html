<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Madiun</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; border-top: 5px solid #1a73e8; }
        h2 { color: #1a73e8; text-align: center; margin-top: 0; margin-bottom: 20px; font-size: 22px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1557b0; }
        button:disabled { background: #999; cursor: not-allowed; }
        #notif { margin-top: 20px; padding: 12px; border-radius: 8px; text-align: center; display: none; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h2>Monitoring Madiun</h2>
    <form id="formLaporan">
        <label>Nama Pekerjaan</label>
        <input type="text" name="namaPekerjaan" id="namaPekerjaan" placeholder="Contoh: Pekerjaan Finishing" required>
        
        <label>Detail Pekerjaan</label>
        <textarea name="detailPekerjaan" id="detailPekerjaan" rows="3" placeholder="Jelaskan progres..." required></textarea>
        
        <label>Persentase Proyek (%)</label>
        <input type="number" name="persentase" id="persentase" min="0" max="100" placeholder="0 - 100" required>
        
        <button type="submit" id="btnKirim">Kirim Laporan</button>
    </form>
    <div id="notif"></div>
</div>

<script>
    // MASUKKAN URL WEB APP (EXEC) ANDA DI SINI
    const scriptURL = 'TEMPEL_URL_WEB_APP_ANDA_DISINI';
    
    const form = document.getElementById('formLaporan');
    const btn = document.getElementById('btnKirim');
    const notif = document.getElementById('notif');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // Validasi link
        if(scriptURL.includes('TEMPEL_URL')) {
            alert('Mohon masukkan URL Web App dari Google Sheets terlebih dahulu!');
            return;
        }

        btn.disabled = true;
        btn.innerText = 'Sedang Mengirim...';
        notif.style.display = 'none';
        
        // Menggunakan FormData agar 'name' pada input terbaca oleh e.parameter di Apps Script
        fetch(scriptURL, { 
            method: 'POST', 
            body: new FormData(form),
            mode: 'no-cors' // Penting untuk bypass CORS dari GitHub ke Google
        })
        .then(() => {
            notif.style.display = 'block';
            notif.style.background = '#d4edda';
            notif.style.color = '#155724';
            notif.innerHTML = '✅ <b>Berhasil!</b> Laporan masuk ke Spreadsheet.';
            btn.disabled = false;
            btn.innerText = 'Kirim Laporan';
            form.reset();
        })
        .catch(error => {
            notif.style.display = 'block';
            notif.style.background = '#f8d7da';
            notif.style.color = '#721c24';
            notif.innerText = '❌ Gagal mengirim. Cek koneksi atau URL Script.';
            btn.disabled = false;
            btn.innerText = 'Kirim Laporan';
            console.error('Error!', error.message);
        });
    });
</script>

</body>
</html>
